services:
  - type: web
    name: trend-radar-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NTFY_TOPIC
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: YOUTUBE_CHANNEL_ID
        sync: false