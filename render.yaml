services:
  - type: web
    name: trend-radar-backend
    runtime: python
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: NTFY_TOPIC
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false
      - key: YOUTUBE_CHANNEL_ID
        sync: false

  - type: web
    name: trend-radar-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false